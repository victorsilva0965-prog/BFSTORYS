<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF Post Maker - Integrado</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #00d2ff;
            --dark: #0f172a;
            --shopee: #ee4d2d;
            --neon-bg: #020617;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .controls {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            background: #1e293b;
            border: 1px solid var(--primary);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .btn-search {
            background: var(--primary);
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            cursor: pointer;
            color: var(--dark);
            font-weight: bold;
        }

        /* --- CANVAS DO POST --- */
        #post-canvas {
            width: 350px;
            height: 600px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            color: #0f172a;
            transition: 0.3s;
        }

        #post-canvas.layout-neon {
            background: var(--neon-bg);
            color: white;
            border: 2px solid var(--primary);
        }

        .post-header { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: 800; letter-spacing: 2px; }
        .post-image { width: 100%; height: 280px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .post-image img { width: 100%; height: 100%; object-fit: cover; }

        .post-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .post-title { font-weight: 800; font-size: 1.3rem; margin: 0; text-transform: uppercase; line-height: 1.2; }
        .post-price { font-size: 2.5rem; color: var(--shopee); font-weight: 800; margin: 5px 0; }
        .layout-neon .post-price { color: var(--primary); text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }

        .post-tag { background: #0f172a; color: var(--primary); display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 600; align-self: center; margin-bottom: 10px; border: 1px solid var(--primary); }

        .post-footer { background: #f8fafc; padding: 15px; text-align: center; border-top: 2px dashed #cbd5e1; }
        .layout-neon .post-footer { background: #0f172a; border-top: 2px dashed var(--primary); }
        .post-link { font-size: 0.65rem; color: #64748b; font-weight: 600; }
        .layout-neon .post-link { color: #cbd5e1; }

        .off-badge {
            position: absolute; top: 20px; right: -30px; background: var(--shopee); color: white;
            padding: 5px 35px; transform: rotate(45deg); font-weight: 800; font-size: 0.8rem; z-index: 10;
        }

        .button-group { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-layout { background: var(--primary); color: var(--dark); }
        .btn-download { background: #22c55e; color: white; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">BF <span style="color:var(--primary)">POST MAKER</span></h2>

    <div class="controls">
        <p style="font-size: 0.8rem; margin-top: 0;">Busque pelo ID do produtos.json:</p>
        <div class="search-box">
            <input type="text" id="searchID" placeholder="Ex: 01">
            <button class="btn-search" onclick="buscarProduto()"><i class='bx bx-search'></i></button>
        </div>
        <p style="font-size: 0.7rem; opacity: 0.6;">Ou edite manualmente:</p>
        <input type="text" id="inTitle" placeholder="Título" oninput="updateManual()">
        <input type="text" id="inPrice" placeholder="Preço" oninput="updateManual()">
    </div>

    <div id="post-canvas">
        <div class="off-badge">20% OFF</div>
        <div class="post-header">BF STORY</div>
        <div class="post-image">
            <img id="postImg" src="https://via.placeholder.com/400?text=BF+STORY" crossOrigin="anonymous">
        </div>
        <div class="post-info">
            <div class="post-tag">OFERTA VÁLIDA ATÉ SÁBADO</div>
            <h1 class="post-title" id="postTitle">AGUARDANDO...</h1>
            <div class="post-price" id="postPrice">R$ 0,00</div>
        </div>
        <div class="post-footer">
            <div class="post-link" id="postLink">Link na Bio ou Direct</div>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-layout" onclick="toggleLayout()"><i class='bx bx-refresh'></i> LAYOUT</button>
        <button class="btn btn-download" onclick="downloadPost()"><i class='bx bx-download'></i> BAIXAR</button>
    </div>

    <script>
        let db = [];

        // Mesma lógica de carregamento do seu site principal
        async function carregarDB() {
            try {
                const response = await fetch('produtos.json?v=' + Date.now());
                const data = await response.json();
                db = Array.isArray(data) ? data : (data.estoque || []);
                console.log("Produtos carregados:", db.length);
            } catch (e) { console.error("Erro ao ler produtos.json", e); }
        }

        function buscarProduto() {
            const id = document.getElementById('searchID').value;
            const p = db.find(item => item.id == id);
            
            if (p) {
                document.getElementById('postTitle').innerText = p.nome;
                document.getElementById('postPrice').innerText = p.preco;
                document.getElementById('postImg').src = p.imgs[0];
                document.getElementById('postLink').innerText = p.link || "shopee.com.br/bfstory";
                
                // Preenche os campos de edição também
                document.getElementById('inTitle').value = p.nome;
                document.getElementById('inPrice').value = p.preco;
            } else {
                alert("Produto não encontrado no arquivo JSON!");
            }
        }

        function updateManual() {
            document.getElementById('postTitle').innerText = document.getElementById('inTitle').value;
            document.getElementById('postPrice').innerText = 'R$ ' + document.getElementById('inPrice').value;
        }

        function toggleLayout() {
            document.getElementById('post-canvas').classList.toggle('layout-neon');
        }

        function downloadPost() {
            html2canvas(document.querySelector("#post-canvas"), {
                useCORS: true,
                scale: 3
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `BF-Post-${document.getElementById('searchID').value || 'novo'}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        window.onload = carregarDB;
    </script>
</body>
  </html>
